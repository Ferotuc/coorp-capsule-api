services:
  api:
    build: .
    container_name: coorp-capsule-api
    environment:
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: 60
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: coorp-capsule-redis
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
